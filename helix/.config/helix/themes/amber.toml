# Amber theme for Helix
# Retro CRT amber inspired by DOS, monochrome monitors, and Alien Isolation terminals.

# --- Syntax Highlighting ---

"attribute" = "wheat"

"type" = "fg"
"type.builtin" = "smoke"
"type.parameter" = "fg"
"type.enum.variant" = "smoke"
"constructor" = "copper"

"constant" = "fg"
"constant.builtin" = "fg"
"constant.character" = "wheat"
"constant.character.escape" = "smoke"
"constant.numeric" = "smoke"
"constant.numeric.integer" = "smoke"
"constant.numeric.float" = "smoke"

"string" = "wheat"
"string.regexp" = "amber"
"string.special" = "ember"
"string.special.path" = "wheat"
"string.special.url" = { fg = "wheat", underline.style = "line" }
"string.special.symbol" = "fg"

"comment" = "dim_bright"
"comment.line" = "dim_bright"
"comment.block" = "dim_bright"
"comment.block.documentation" = "dim_bright"

"variable" = "fg"
"variable.builtin" = "amber"
"variable.parameter" = "fg"
"variable.other.member" = "fg"

"label" = "copper"

"punctuation" = "dim_bright"
"punctuation.delimiter" = "dim_bright"
"punctuation.bracket" = "dim_bright"
"punctuation.special" = "fg"

"keyword" = "ember"
"keyword.control" = "ember"
"keyword.control.conditional" = "ember"
"keyword.control.repeat" = "ember"
"keyword.control.import" = "ember"
"keyword.control.return" = "ember"
"keyword.control.exception" = "ember"
"keyword.operator" = "ember"
"keyword.directive" = "smoke"
"keyword.function" = "ember"
"keyword.storage" = "ember"
"keyword.storage.type" = "ember"
"keyword.storage.modifier" = "ember"

"operator" = "copper"
"special" = "copper"

"function" = "amber"
"function.builtin" = "amber"
"function.method" = "amber"
"function.macro" = "ember"
"function.special" = "amber"

"tag" = "copper"
"tag.builtin" = "copper"

"namespace" = "dim_bright"

"markup.heading" = "fg"
"markup.heading.1" = "amber"
"markup.heading.2" = "amber"
"markup.heading.3" = "fg"
"markup.heading.4" = "fg"
"markup.heading.5" = "dim_bright"
"markup.heading.6" = "dim_bright"
"markup.list" = "ember"
"markup.bold" = "fg"
"markup.italic" = "fg"
"markup.strikethrough" = { modifiers = ["crossed_out"] }
"markup.link" = { fg = "wheat", underline.style = "line" }
"markup.link.url" = { fg = "wheat", underline.style = "line" }
"markup.link.label" = "wheat"
"markup.link.text" = "amber"
"markup.quote" = "dim_bright"
"markup.raw" = "copper"
"markup.raw.inline" = "copper"
"markup.raw.block" = "copper"

"diff.plus" = "amber"
"diff.plus.gutter" = "amber"
"diff.minus" = "ember"
"diff.minus.gutter" = "ember"
"diff.delta" = "smoke"
"diff.delta.gutter" = "smoke"

# --- UI Elements ---

"ui.background" = { bg = "bg" }
"ui.background.separator" = { fg = "dark" }

"ui.cursor" = { fg = "bg", bg = "white" }
"ui.cursor.normal" = { fg = "bg", bg = "fg" }
"ui.cursor.insert" = { fg = "bg", bg = "bright" }
"ui.cursor.select" = { fg = "bg", bg = "amber" }
"ui.cursor.match" = { fg = "black", bg = "amber" }
"ui.cursor.primary" = { fg = "bg", bg = "white" }
"ui.cursor.primary.normal" = { fg = "bg", bg = "fg" }
"ui.cursor.primary.insert" = { fg = "bg", bg = "bright" }
"ui.cursor.primary.select" = { fg = "bg", bg = "amber" }

"ui.gutter" = { bg = "bg" }
"ui.gutter.selected" = { bg = "bg_1" }

"ui.linenr" = { fg = "dark" }
"ui.linenr.selected" = { fg = "amber" }

"ui.statusline" = { fg = "fg", bg = "dark" }
"ui.statusline.inactive" = { fg = "dim_bright", bg = "bg_1" }
"ui.statusline.normal" = { fg = "fg", bg = "dark" }
"ui.statusline.insert" = { fg = "black", bg = "smoke" }
"ui.statusline.select" = { fg = "black", bg = "ember" }
"ui.statusline.separator" = { fg = "dark" }

"ui.bufferline" = { fg = "dim_bright", bg = "bg" }
"ui.bufferline.active" = { fg = "fg", bg = "bg_1" }
"ui.bufferline.background" = { bg = "bg" }

"ui.popup" = { fg = "fg", bg = "bg_1" }
"ui.popup.info" = { fg = "fg", bg = "bg_1" }

"ui.window" = { fg = "dark" }
"ui.help" = { fg = "fg", bg = "bg_1" }

"ui.text" = { fg = "fg" }
"ui.text.focus" = { fg = "bright" }
"ui.text.inactive" = { fg = "dim_bright" }
"ui.text.info" = { fg = "fg" }
"ui.text.directory" = "amber"

"ui.virtual" = { fg = "dark" }
"ui.virtual.ruler" = { bg = "bg_1" }
"ui.virtual.whitespace" = { fg = "dark" }
"ui.virtual.indent-guide" = { fg = "dark" }
"ui.virtual.inlay-hint" = { fg = "dim" }
"ui.virtual.inlay-hint.parameter" = { fg = "dim" }
"ui.virtual.inlay-hint.type" = { fg = "dim" }
"ui.virtual.wrap" = { fg = "dark" }
"ui.virtual.jump-label" = "ember"

"ui.menu" = { fg = "amber", bg = "bg_1" }
"ui.menu.selected" = { fg = "fg", bg = "bg_1" }
"ui.menu.scroll" = { fg = "dim", bg = "bg_1" }

"ui.selection" = { fg = "amber", bg = "bg_1" }
"ui.selection.primary" = { fg = "amber", bg = "bg_1" }

"ui.highlight" = { bg = "bg_1" }
"ui.highlight.frameline" = { bg = "bg_1" }

"ui.cursorline.primary" = { bg = "bg_1" }
"ui.cursorline.secondary" = { bg = "bg_1" }
"ui.cursorcolumn.primary" = { bg = "bg_1" }
"ui.cursorcolumn.secondary" = { bg = "bg_1" }

"warning" = { fg = "copper" }
"error" = { fg = "ember" }
"info" = { fg = "smoke" }
"hint" = { fg = "dim" }

"diagnostic.hint" = { underline = { color = "dim", style = "dotted" } }
"diagnostic.info" = { underline = { color = "smoke", style = "dotted" } }
"diagnostic.warning" = { underline = { color = "copper", style = "curl" } }
"diagnostic.error" = { underline = { color = "ember", style = "curl" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }
"diagnostic.deprecated" = { modifiers = ["crossed_out"] }

# --- Palette ---
# CRT amber warmth — darkest to lightest, plus five amber accents

[palette]
black = "#000000"
bg = "#0E0A06"
bg_1 = "#1E1610"
dark = "#2E2418"
dim = "#3E3020"
dim_bright = "#705838"
fg = "#B89868"
bright = "#D8B888"
white = "#FFE8C8"

ember = "#FFAA33"
amber = "#AA8040"
wheat = "#9A8A60"
copper = "#AA7838"
smoke = "#908070"
