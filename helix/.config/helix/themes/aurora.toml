# Aurora theme for Helix.

# --- Syntax Highlighting ---

"attribute" = "mist"

"type" = "fg"
"type.builtin" = "lavender"
"type.parameter" = "fg"
"type.enum.variant" = "lavender"
"constructor" = "periwinkle"

"constant" = "fg"
"constant.builtin" = "fg"
"constant.character" = "slate"
"constant.character.escape" = "lavender"
"constant.numeric" = "slate"
"constant.numeric.integer" = "slate"
"constant.numeric.float" = "slate"

"string" = "slate"
"string.regexp" = "teal"
"string.special" = "periwinkle"
"string.special.path" = "slate"
"string.special.url" = { fg = "slate", underline.style = "line" }
"string.special.symbol" = "fg"

"comment" = "dim_bright"
"comment.line" = "dim_bright"
"comment.block" = "dim_bright"
"comment.block.documentation" = "dim_bright"

"variable" = "fg"
"variable.builtin" = "teal"
"variable.parameter" = "fg"
"variable.other.member" = "fg"

"label" = "periwinkle"

"punctuation" = "dim_bright"
"punctuation.delimiter" = "dim_bright"
"punctuation.bracket" = "dim_bright"
"punctuation.special" = "fg"

"keyword" = "periwinkle"
"keyword.control" = "periwinkle"
"keyword.control.conditional" = "periwinkle"
"keyword.control.repeat" = "periwinkle"
"keyword.control.import" = "periwinkle"
"keyword.control.return" = "periwinkle"
"keyword.control.exception" = "periwinkle"
"keyword.operator" = "periwinkle"
"keyword.directive" = "lavender"
"keyword.function" = "periwinkle"
"keyword.storage" = "periwinkle"
"keyword.storage.type" = "periwinkle"
"keyword.storage.modifier" = "periwinkle"

"operator" = "mist"
"special" = "mist"

"function" = "teal"
"function.builtin" = "teal"
"function.method" = "teal"
"function.macro" = "periwinkle"
"function.special" = "teal"

"tag" = "lavender"
"tag.builtin" = "lavender"

"namespace" = "dim_bright"

"markup.heading" = "fg"
"markup.heading.1" = "lavender"
"markup.heading.2" = "teal"
"markup.heading.3" = "fg"
"markup.heading.4" = "fg"
"markup.heading.5" = "dim_bright"
"markup.heading.6" = "dim_bright"
"markup.list" = "periwinkle"
"markup.bold" = "fg"
"markup.italic" = "fg"
"markup.strikethrough" = { modifiers = ["crossed_out"] }
"markup.link" = { fg = "slate", underline.style = "line" }
"markup.link.url" = { fg = "slate", underline.style = "line" }
"markup.link.label" = "slate"
"markup.link.text" = "teal"
"markup.quote" = "dim_bright"
"markup.raw" = "mist"
"markup.raw.inline" = "mist"
"markup.raw.block" = "mist"

"diff.plus" = "teal"
"diff.plus.gutter" = "teal"
"diff.minus" = "periwinkle"
"diff.minus.gutter" = "periwinkle"
"diff.delta" = "lavender"
"diff.delta.gutter" = "lavender"

# --- UI Elements ---

"ui.background" = { bg = "bg" }
"ui.background.separator" = { fg = "dark" }

"ui.cursor" = { fg = "bg", bg = "white" }
"ui.cursor.normal" = { fg = "bg", bg = "fg" }
"ui.cursor.insert" = { fg = "bg", bg = "bright" }
"ui.cursor.select" = { fg = "bg", bg = "teal" }
"ui.cursor.match" = { fg = "black", bg = "teal" }
"ui.cursor.primary" = { fg = "bg", bg = "white" }
"ui.cursor.primary.normal" = { fg = "bg", bg = "fg" }
"ui.cursor.primary.insert" = { fg = "bg", bg = "bright" }
"ui.cursor.primary.select" = { fg = "bg", bg = "teal" }

"ui.gutter" = { bg = "bg" }
"ui.gutter.selected" = { bg = "bg_1" }

"ui.linenr" = { fg = "dark" }
"ui.linenr.selected" = { fg = "lavender" }

"ui.statusline" = { fg = "fg", bg = "dark" }
"ui.statusline.inactive" = { fg = "dim_bright", bg = "bg_1" }
"ui.statusline.normal" = { fg = "fg", bg = "dark" }
"ui.statusline.insert" = { fg = "black", bg = "teal" }
"ui.statusline.select" = { fg = "black", bg = "lavender" }
"ui.statusline.separator" = { fg = "dark" }

"ui.bufferline" = { fg = "dim_bright", bg = "bg" }
"ui.bufferline.active" = { fg = "fg", bg = "bg_1" }
"ui.bufferline.background" = { bg = "bg" }

"ui.popup" = { fg = "fg", bg = "bg_1" }
"ui.popup.info" = { fg = "fg", bg = "bg_1" }

"ui.window" = { fg = "dark" }
"ui.help" = { fg = "fg", bg = "bg_1" }

"ui.text" = { fg = "fg" }
"ui.text.focus" = { fg = "bright" }
"ui.text.inactive" = { fg = "dim_bright" }
"ui.text.info" = { fg = "fg" }
"ui.text.directory" = "teal"

"ui.virtual" = { fg = "dark" }
"ui.virtual.ruler" = { bg = "bg_1" }
"ui.virtual.whitespace" = { fg = "dark" }
"ui.virtual.indent-guide" = { fg = "dark" }
"ui.virtual.inlay-hint" = { fg = "dim" }
"ui.virtual.inlay-hint.parameter" = { fg = "dim" }
"ui.virtual.inlay-hint.type" = { fg = "dim" }
"ui.virtual.wrap" = { fg = "dark" }
"ui.virtual.jump-label" = "lavender"

"ui.menu" = { fg = "teal", bg = "bg_1" }
"ui.menu.selected" = { fg = "fg", bg = "bg_1" }
"ui.menu.scroll" = { fg = "dim", bg = "bg_1" }

"ui.selection" = { fg = "teal", bg = "bg_1" }
"ui.selection.primary" = { fg = "teal", bg = "bg_1" }

"ui.highlight" = { bg = "bg_1" }
"ui.highlight.frameline" = { bg = "bg_1" }

"ui.cursorline.primary" = { bg = "bg_1" }
"ui.cursorline.secondary" = { bg = "bg_1" }
"ui.cursorcolumn.primary" = { bg = "bg_1" }
"ui.cursorcolumn.secondary" = { bg = "bg_1" }

"warning" = { fg = "slate" }
"error" = { fg = "periwinkle" }
"info" = { fg = "teal" }
"hint" = { fg = "dim" }

"diagnostic.hint" = { underline = { color = "dim", style = "dotted" } }
"diagnostic.info" = { underline = { color = "teal", style = "dotted" } }
"diagnostic.warning" = { underline = { color = "slate", style = "curl" } }
"diagnostic.error" = { underline = { color = "periwinkle", style = "curl" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }
"diagnostic.deprecated" = { modifiers = ["crossed_out"] }

# --- Palette ---
# Deep blue-black sky, cool blue-grey text, lavender and teal as the only warmth.

[palette]
black = "#000000"
bg = "#0D1120"
bg_1 = "#131928"
dark = "#1A2235"
dim = "#263045"
dim_bright = "#485E72"
fg = "#B8C8D8"
bright = "#D0DDE8"
white = "#E8F2FA"

lavender = "#A48FD4"
teal = "#3DBFAA"
periwinkle = "#6878B0"
slate = "#6888A0"
mist = "#5A7888"
