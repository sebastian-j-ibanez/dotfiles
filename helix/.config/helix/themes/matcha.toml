# Matcha theme for Helix

# --- Syntax Highlighting ---

"attribute" = "stone"

"type" = "fg"
"type.builtin" = "sable"
"type.parameter" = "fg"
"type.enum.variant" = "sable"
"constructor" = "gold"

"constant" = "fg"
"constant.builtin" = "fg"
"constant.character" = "stone"
"constant.character.escape" = "sable"
"constant.numeric" = "sable"
"constant.numeric.integer" = "sable"
"constant.numeric.float" = "sable"

"string" = "stone"
"string.regexp" = "sable"
"string.special" = "gold"
"string.special.path" = "stone"
"string.special.url" = { fg = "stone", underline.style = "line" }
"string.special.symbol" = "fg"

"comment" = "dim_bright"
"comment.line" = "dim_bright"
"comment.block" = "dim_bright"
"comment.block.documentation" = "dim_bright"

"variable" = "fg"
"variable.builtin" = "sable"
"variable.parameter" = "fg"
"variable.other.member" = "fg"

"label" = "gold"

"punctuation" = "dim_bright"
"punctuation.delimiter" = "dim_bright"
"punctuation.bracket" = "dim_bright"
"punctuation.special" = "fg"

"keyword" = "gold"
"keyword.control" = "gold"
"keyword.control.conditional" = "gold"
"keyword.control.repeat" = "gold"
"keyword.control.import" = "gold"
"keyword.control.return" = "gold"
"keyword.control.exception" = "gold"
"keyword.operator" = "gold"
"keyword.directive" = "sable"
"keyword.function" = "gold"
"keyword.storage" = "gold"
"keyword.storage.type" = "gold"
"keyword.storage.modifier" = "gold"

"operator" = "gold"
"special" = "gold"

"function" = "matcha"
"function.builtin" = "matcha"
"function.method" = "matcha"
"function.macro" = "gold"
"function.special" = "matcha"

"tag" = "gold"
"tag.builtin" = "gold"

"namespace" = "dim_bright"

"markup.heading" = "fg"
"markup.heading.1" = "matcha"
"markup.heading.2" = "matcha"
"markup.heading.3" = "fg"
"markup.heading.4" = "fg"
"markup.heading.5" = "dim_bright"
"markup.heading.6" = "dim_bright"
"markup.list" = "gold"
"markup.bold" = "fg"
"markup.italic" = "fg"
"markup.strikethrough" = { modifiers = ["crossed_out"] }
"markup.link" = { fg = "stone", underline.style = "line" }
"markup.link.url" = { fg = "stone", underline.style = "line" }
"markup.link.label" = "stone"
"markup.link.text" = "matcha"
"markup.quote" = "dim_bright"
"markup.raw" = "gold"
"markup.raw.inline" = "gold"
"markup.raw.block" = "gold"

"diff.plus" = "matcha"
"diff.plus.gutter" = "matcha"
"diff.minus" = "gold"
"diff.minus.gutter" = "gold"
"diff.delta" = "sable"
"diff.delta.gutter" = "sable"

# --- UI Elements ---

"ui.background" = { bg = "bg" }
"ui.background.separator" = { fg = "dark" }

"ui.cursor" = { fg = "bg", bg = "white" }
"ui.cursor.normal" = { fg = "bg", bg = "fg" }
"ui.cursor.insert" = { fg = "bg", bg = "bright" }
"ui.cursor.select" = { fg = "bg", bg = "matcha" }
"ui.cursor.match" = { fg = "black", bg = "matcha" }
"ui.cursor.primary" = { fg = "bg", bg = "white" }
"ui.cursor.primary.normal" = { fg = "bg", bg = "fg" }
"ui.cursor.primary.insert" = { fg = "bg", bg = "bright" }
"ui.cursor.primary.select" = { fg = "bg", bg = "matcha" }

"ui.gutter" = { bg = "bg" }
"ui.gutter.selected" = { bg = "bg_1" }

"ui.linenr" = { fg = "dark" }
"ui.linenr.selected" = { fg = "matcha" }

"ui.statusline" = { fg = "fg", bg = "dark" }
"ui.statusline.inactive" = { fg = "dim_bright", bg = "bg_1" }
"ui.statusline.normal" = { fg = "fg", bg = "dark" }
"ui.statusline.insert" = { fg = "black", bg = "sable" }
"ui.statusline.select" = { fg = "black", bg = "gold" }
"ui.statusline.separator" = { fg = "dark" }

"ui.bufferline" = { fg = "dim_bright", bg = "bg" }
"ui.bufferline.active" = { fg = "fg", bg = "bg_1" }
"ui.bufferline.background" = { bg = "bg" }

"ui.popup" = { fg = "fg", bg = "bg_1" }
"ui.popup.info" = { fg = "fg", bg = "bg_1" }

"ui.window" = { fg = "dark" }
"ui.help" = { fg = "fg", bg = "bg_1" }

"ui.text" = { fg = "fg" }
"ui.text.focus" = { fg = "bright" }
"ui.text.inactive" = { fg = "dim_bright" }
"ui.text.info" = { fg = "fg" }
"ui.text.directory" = "matcha"

"ui.virtual" = { fg = "dark" }
"ui.virtual.ruler" = { bg = "bg_1" }
"ui.virtual.whitespace" = { fg = "dark" }
"ui.virtual.indent-guide" = { fg = "dark" }
"ui.virtual.inlay-hint" = { fg = "dim" }
"ui.virtual.inlay-hint.parameter" = { fg = "dim" }
"ui.virtual.inlay-hint.type" = { fg = "dim" }
"ui.virtual.wrap" = { fg = "dark" }
"ui.virtual.jump-label" = "gold"

"ui.menu" = { fg = "matcha", bg = "bg_1" }
"ui.menu.selected" = { fg = "fg", bg = "bg_1" }
"ui.menu.scroll" = { fg = "dim", bg = "bg_1" }

"ui.selection" = { fg = "matcha", bg = "bg_1" }
"ui.selection.primary" = { fg = "matcha", bg = "bg_1" }

"ui.highlight" = { bg = "bg_1" }
"ui.highlight.frameline" = { bg = "bg_1" }

"ui.cursorline.primary" = { bg = "bg_1" }
"ui.cursorline.secondary" = { bg = "bg_1" }
"ui.cursorcolumn.primary" = { bg = "bg_1" }
"ui.cursorcolumn.secondary" = { bg = "bg_1" }

"warning" = { fg = "gold" }
"error" = { fg = "gold" }
"info" = { fg = "sable" }
"hint" = { fg = "dim" }

"diagnostic.hint" = { underline = { color = "dim", style = "dotted" } }
"diagnostic.info" = { underline = { color = "sable", style = "dotted" } }
"diagnostic.warning" = { underline = { color = "gold", style = "curl" } }
"diagnostic.error" = { underline = { color = "gold", style = "curl" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }
"diagnostic.deprecated" = { modifiers = ["crossed_out"] }

# --- Palette ---
# Deep moss-green darkness, pale matcha text, warm gold accents

[palette]
black = "#000000"
bg = "#0D1510"
bg_1 = "#172018"
dark = "#253020"
dim = "#344028"
dim_bright = "#586848"
fg = "#A8C898"
bright = "#C8E8B8"
white = "#E8F8E0"

matcha = "#78B868"
gold = "#D89A40"
sable = "#5A9488"
stone = "#9A9070"
cream = "#B8B080"
