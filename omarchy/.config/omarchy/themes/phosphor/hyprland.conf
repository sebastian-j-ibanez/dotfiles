$activeBorderColor = rgb(33FF33)
$activeShadowColor = rgb(33FF33)
$inactiveBorderColor = rgba(1C2E1C99)
$inactiveShadowColor = rgba(33FF3377)

general {
    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor
    gaps_in = 6
    gaps_out = 12
}

group {
    col.border_active = $activeBorderColor
    col.border_inactive = $inactiveBorderColor
}

# More transparent than default to let the backdrop show through
windowrule = opacity 0.88 0.78, match:tag terminal

decoration {
    shadow {
        enabled = true
        range = 12
        render_power = 4
        color = $activeShadowColor
        color_inactive = $inactiveShadowColor
    }
}
