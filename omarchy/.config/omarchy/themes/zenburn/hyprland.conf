$activeBorderColor = rgb(8cd0d3)
$activeShadowColor = rgb(8cd0d3)
$inactiveBorderColor = rgba(4f4f4f99)
$inactiveShadowColor = rgba(8cd0d377)

general {
    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor
    gaps_in = 6
    gaps_out = 12
}

group {
    col.border_active = $activeBorderColor
    col.border_inactive = $inactiveBorderColor
}

windowrule = opacity 0.88 0.78, match:tag terminal

decoration {
    shadow {
        enabled = true
        range = 12
        render_power = 4
        color = $activeShadowColor
        color_inactive = $inactiveShadowColor
    }
}
