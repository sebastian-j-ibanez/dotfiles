# Zenburn theme for Helix
# Faithful adaptation of the classic Vim Zenburn colorscheme

# --- Syntax Highlighting ---

"attribute" = "coral"

"type" = "fg"
"type.builtin" = "sky"
"type.parameter" = "fg"
"type.enum.variant" = "sky"
"constructor" = "rust"

"constant" = "fg"
"constant.builtin" = "fg"
"constant.character" = "coral"
"constant.character.escape" = "sky"
"constant.numeric" = "sage"
"constant.numeric.integer" = "sage"
"constant.numeric.float" = "sage"

"string" = "coral"
"string.regexp" = "sage"
"string.special" = "amber"
"string.special.path" = "coral"
"string.special.url" = { fg = "coral", underline.style = "line" }
"string.special.symbol" = "fg"

"comment" = "moss"
"comment.line" = "moss"
"comment.block" = "moss"
"comment.block.documentation" = "moss"

"variable" = "fg"
"variable.builtin" = "sage"
"variable.parameter" = "fg"
"variable.other.member" = "fg"

"label" = "rust"

"punctuation" = "dim_bright"
"punctuation.delimiter" = "dim_bright"
"punctuation.bracket" = "dim_bright"
"punctuation.special" = "fg"

"keyword" = "amber"
"keyword.control" = "amber"
"keyword.control.conditional" = "amber"
"keyword.control.repeat" = "amber"
"keyword.control.import" = "amber"
"keyword.control.return" = "amber"
"keyword.control.exception" = "amber"
"keyword.operator" = "amber"
"keyword.directive" = "sky"
"keyword.function" = "amber"
"keyword.storage" = "amber"
"keyword.storage.type" = "amber"
"keyword.storage.modifier" = "amber"

"operator" = "rust"
"special" = "rust"

"function" = "sage"
"function.builtin" = "sage"
"function.method" = "sage"
"function.macro" = "rust"
"function.special" = "sage"

"tag" = "rust"
"tag.builtin" = "rust"

"namespace" = "dim_bright"

"markup.heading" = "fg"
"markup.heading.1" = "sage"
"markup.heading.2" = "sage"
"markup.heading.3" = "fg"
"markup.heading.4" = "fg"
"markup.heading.5" = "dim_bright"
"markup.heading.6" = "dim_bright"
"markup.list" = "amber"
"markup.bold" = "fg"
"markup.italic" = "fg"
"markup.strikethrough" = { modifiers = ["crossed_out"] }
"markup.link" = { fg = "coral", underline.style = "line" }
"markup.link.url" = { fg = "coral", underline.style = "line" }
"markup.link.label" = "coral"
"markup.link.text" = "sage"
"markup.quote" = "moss"
"markup.raw" = "rust"
"markup.raw.inline" = "rust"
"markup.raw.block" = "rust"

"diff.plus" = "sage"
"diff.plus.gutter" = "sage"
"diff.minus" = "coral"
"diff.minus.gutter" = "coral"
"diff.delta" = "sky"
"diff.delta.gutter" = "sky"

# --- UI Elements ---

"ui.background" = { bg = "bg" }
"ui.background.separator" = { fg = "dark" }

"ui.cursor" = { fg = "bg", bg = "white" }
"ui.cursor.normal" = { fg = "bg", bg = "fg" }
"ui.cursor.insert" = { fg = "bg", bg = "bright" }
"ui.cursor.select" = { fg = "bg", bg = "sage" }
"ui.cursor.match" = { fg = "black", bg = "sage" }
"ui.cursor.primary" = { fg = "bg", bg = "white" }
"ui.cursor.primary.normal" = { fg = "bg", bg = "fg" }
"ui.cursor.primary.insert" = { fg = "bg", bg = "bright" }
"ui.cursor.primary.select" = { fg = "bg", bg = "sage" }

"ui.gutter" = { bg = "bg" }
"ui.gutter.selected" = { bg = "bg_1" }

"ui.linenr" = { fg = "dark" }
"ui.linenr.selected" = { fg = "sage" }

"ui.statusline" = { fg = "fg", bg = "dark" }
"ui.statusline.inactive" = { fg = "dim_bright", bg = "bg_1" }
"ui.statusline.normal" = { fg = "fg", bg = "dark" }
"ui.statusline.insert" = { fg = "black", bg = "sky" }
"ui.statusline.select" = { fg = "black", bg = "amber" }
"ui.statusline.separator" = { fg = "dark" }

"ui.bufferline" = { fg = "dim_bright", bg = "bg" }
"ui.bufferline.active" = { fg = "fg", bg = "bg_1" }
"ui.bufferline.background" = { bg = "bg" }

"ui.popup" = { fg = "fg", bg = "bg_1" }
"ui.popup.info" = { fg = "fg", bg = "bg_1" }

"ui.window" = { fg = "dark" }
"ui.help" = { fg = "fg", bg = "bg_1" }

"ui.text" = { fg = "fg" }
"ui.text.focus" = { fg = "bright" }
"ui.text.inactive" = { fg = "dim_bright" }
"ui.text.info" = { fg = "fg" }
"ui.text.directory" = "sage"

"ui.virtual" = { fg = "dark" }
"ui.virtual.ruler" = { bg = "bg_1" }
"ui.virtual.whitespace" = { fg = "dark" }
"ui.virtual.indent-guide" = { fg = "dark" }
"ui.virtual.inlay-hint" = { fg = "dim" }
"ui.virtual.inlay-hint.parameter" = { fg = "dim" }
"ui.virtual.inlay-hint.type" = { fg = "dim" }
"ui.virtual.wrap" = { fg = "dark" }
"ui.virtual.jump-label" = "amber"

"ui.menu" = { fg = "sage", bg = "bg_1" }
"ui.menu.selected" = { fg = "fg", bg = "bg_1" }
"ui.menu.scroll" = { fg = "dim", bg = "bg_1" }

"ui.selection" = { fg = "sage", bg = "bg_1" }
"ui.selection.primary" = { fg = "sage", bg = "bg_1" }

"ui.highlight" = { bg = "bg_1" }
"ui.highlight.frameline" = { bg = "bg_1" }

"ui.cursorline.primary" = { bg = "bg_1" }
"ui.cursorline.secondary" = { bg = "bg_1" }
"ui.cursorcolumn.primary" = { bg = "bg_1" }
"ui.cursorcolumn.secondary" = { bg = "bg_1" }

"warning" = { fg = "rust" }
"error" = { fg = "coral" }
"info" = { fg = "sky" }
"hint" = { fg = "dim" }

"diagnostic.hint" = { underline = { color = "dim", style = "dotted" } }
"diagnostic.info" = { underline = { color = "sky", style = "dotted" } }
"diagnostic.warning" = { underline = { color = "rust", style = "curl" } }
"diagnostic.error" = { underline = { color = "coral", style = "curl" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }
"diagnostic.deprecated" = { modifiers = ["crossed_out"] }

# --- Palette ---
# Classic Zenburn — warm, low-contrast palette easy on the eyes.

[palette]
black = "#000000"
bg = "#3f3f3f"
bg_1 = "#4f4f4f"
dark = "#5f5f5f"
dim = "#6f6f6f"
dim_bright = "#9f9f9f"
fg = "#dcdccc"
bright = "#ffffef"
white = "#ffffff"

moss = "#7f9f7f"
sage = "#8cd0d3"
amber = "#f0dfaf"
coral = "#cc9393"
rust = "#ffcfaf"
sky = "#94bff3"
