$activeBorderColor = rgb(00D4EE)
$activeShadowColor = rgb(00D4EE)
$inactiveBorderColor = rgba(1E2E4099)
$inactiveShadowColor = rgba(00D4EE77)

general {
    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor
    gaps_in = 6
    gaps_out = 12
}

group {
    col.border_active = $activeBorderColor
    col.border_inactive = $inactiveBorderColor
}

# More transparent than default to let the grid show through
windowrule = opacity 0.88 0.78, match:tag terminal

decoration {
    shadow {
        enabled = true
        range = 12
        render_power = 4
        color = $activeShadowColor
        color_inactive = $inactiveShadowColor
    }
}
