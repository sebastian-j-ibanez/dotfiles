# Lumon Light theme for Helix
# The Lumon Industries office floor bathed in fluorescent light.
# Same blue-monochrome semantics as lumon.toml, palette inverted.

# --- Syntax Highlighting ---

"attribute" = "mist"

"type" = "fg"
"type.builtin" = "pale"
"type.parameter" = "fg"
"type.enum.variant" = "pale"
"constructor" = "mid"

"constant" = "fg"
"constant.builtin" = "fg"
"constant.character" = "mist"
"constant.character.escape" = "pale"
"constant.numeric" = "pale"
"constant.numeric.integer" = "pale"
"constant.numeric.float" = "pale"

"string" = "mist"
"string.regexp" = "sky"
"string.special" = "deep"
"string.special.path" = "mist"
"string.special.url" = { fg = "mist", underline.style = "line" }
"string.special.symbol" = "fg"

"comment" = "dim_bright"
"comment.line" = "dim_bright"
"comment.block" = "dim_bright"
"comment.block.documentation" = "dim_bright"

"variable" = "fg"
"variable.builtin" = "sky"
"variable.parameter" = "fg"
"variable.other.member" = "fg"

"label" = "mid"

"punctuation" = "dim_bright"
"punctuation.delimiter" = "dim_bright"
"punctuation.bracket" = "dim_bright"
"punctuation.special" = "fg"

"keyword" = "deep"
"keyword.control" = "deep"
"keyword.control.conditional" = "deep"
"keyword.control.repeat" = "deep"
"keyword.control.import" = "deep"
"keyword.control.return" = "deep"
"keyword.control.exception" = "deep"
"keyword.operator" = "deep"
"keyword.directive" = "pale"
"keyword.function" = "deep"
"keyword.storage" = "deep"
"keyword.storage.type" = "deep"
"keyword.storage.modifier" = "deep"

"operator" = "mid"
"special" = "mid"

"function" = "sky"
"function.builtin" = "sky"
"function.method" = "sky"
"function.macro" = "deep"
"function.special" = "sky"

"tag" = "mid"
"tag.builtin" = "mid"

"namespace" = "dim_bright"

"markup.heading" = "fg"
"markup.heading.1" = "sky"
"markup.heading.2" = "sky"
"markup.heading.3" = "fg"
"markup.heading.4" = "fg"
"markup.heading.5" = "dim_bright"
"markup.heading.6" = "dim_bright"
"markup.list" = "deep"
"markup.bold" = "fg"
"markup.strikethrough" = { modifiers = ["crossed_out"] }
"markup.link" = { fg = "mist", underline.style = "line" }
"markup.link.url" = { fg = "mist", underline.style = "line" }
"markup.link.label" = "mist"
"markup.link.text" = "sky"
"markup.quote" = "dim_bright"
"markup.raw" = "mid"
"markup.raw.inline" = "mid"
"markup.raw.block" = "mid"

"diff.plus" = "sky"
"diff.plus.gutter" = "sky"
"diff.minus" = "deep"
"diff.minus.gutter" = "deep"
"diff.delta" = "pale"
"diff.delta.gutter" = "pale"

# --- UI Elements ---

"ui.background" = { bg = "bg" }
"ui.background.separator" = { fg = "dark" }

"ui.cursor" = { fg = "bg", bg = "bright" }
"ui.cursor.normal" = { fg = "bg", bg = "fg" }
"ui.cursor.insert" = { fg = "bg", bg = "sky" }
"ui.cursor.select" = { fg = "bg", bg = "mid" }
"ui.cursor.match" = { fg = "bg", bg = "sky" }
"ui.cursor.primary" = { fg = "bg", bg = "bright" }
"ui.cursor.primary.normal" = { fg = "bg", bg = "fg" }
"ui.cursor.primary.insert" = { fg = "bg", bg = "sky" }
"ui.cursor.primary.select" = { fg = "bg", bg = "mid" }

"ui.gutter" = { bg = "bg" }
"ui.gutter.selected" = { bg = "bg_1" }

"ui.linenr" = { fg = "dark" }
"ui.linenr.selected" = { fg = "sky" }

"ui.statusline" = { fg = "statusline_fg", bg = "statusline_bg" }
"ui.statusline.inactive" = { fg = "dim_bright", bg = "bg_1" }
"ui.statusline.normal" = { fg = "statusline_fg", bg = "statusline_bg" }
"ui.statusline.insert" = { fg = "bg", bg = "sky" }
"ui.statusline.select" = { fg = "bg", bg = "mid" }
"ui.statusline.separator" = { fg = "dark" }

"ui.bufferline" = { fg = "dim_bright", bg = "bg" }
"ui.bufferline.active" = { fg = "fg", bg = "bg_1" }
"ui.bufferline.background" = { bg = "bg" }

"ui.popup" = { fg = "fg", bg = "bg_1" }
"ui.popup.info" = { fg = "fg", bg = "bg_1" }

"ui.window" = { fg = "dark" }
"ui.help" = { fg = "fg", bg = "bg_1" }

"ui.text" = { fg = "fg" }
"ui.text.focus" = { fg = "bright" }
"ui.text.inactive" = { fg = "dim_bright" }
"ui.text.info" = { fg = "fg" }
"ui.text.directory" = "sky"

"ui.virtual" = { fg = "dark" }
"ui.virtual.ruler" = { bg = "bg_1" }
"ui.virtual.whitespace" = { fg = "dark" }
"ui.virtual.indent-guide" = { fg = "dark" }
"ui.virtual.inlay-hint" = { fg = "dim" }
"ui.virtual.inlay-hint.parameter" = { fg = "dim" }
"ui.virtual.inlay-hint.type" = { fg = "dim" }
"ui.virtual.wrap" = { fg = "dark" }
"ui.virtual.jump-label" = "deep"

"ui.menu" = { fg = "sky", bg = "bg_1" }
"ui.menu.selected" = { fg = "fg", bg = "bg_1" }
"ui.menu.scroll" = { fg = "dim", bg = "bg_1" }

"ui.selection" = { bg = "selection" }
"ui.selection.primary" = { bg = "selection" }

"ui.highlight" = { bg = "bg_1" }
"ui.highlight.frameline" = { bg = "bg_1" }

"ui.cursorline.primary" = { bg = "bg_1" }
"ui.cursorline.secondary" = { bg = "bg_1" }
"ui.cursorcolumn.primary" = { bg = "bg_1" }
"ui.cursorcolumn.secondary" = { bg = "bg_1" }

"warning" = { fg = "mid" }
"error" = { fg = "deep" }
"info" = { fg = "pale" }
"hint" = { fg = "dim" }

"diagnostic.hint" = { underline = { color = "dim", style = "dotted" } }
"diagnostic.info" = { underline = { color = "pale", style = "dotted" } }
"diagnostic.warning" = { underline = { color = "mid", style = "curl" } }
"diagnostic.error" = { underline = { color = "deep", style = "curl" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }
"diagnostic.deprecated" = { modifiers = ["crossed_out"] }

# --- Palette ---
# Inverted luminance from lumon dark — same blue monochrome character, light office floor.

[palette]
black      = "#000000"
bg         = "#eef4f8"   # main background — cool clinical white
bg_1       = "#ddeaf3"   # slightly darker — selections, cursorline, menus
selection  = "#c8dff0"   # selection highlight — clearly visible on light bg
dark       = "#b4ccd8"   # borders, separators
dim        = "#6a90a8"   # virtual text, gutter
dim_bright = "#3a6882"   # comments — readable but clearly secondary
fg         = "#152535"   # main text — dark navy
bright     = "#060e16"   # near-black — active cursor emphasis
white      = "#ffffff"

statusline_bg = "#1b3550"   # dark navy bar — echoes the Lumon dark header
statusline_fg = "#c8dff0"   # light blue-white text on statusline

sky  = "#1270b5"   # primary accent — functions, headings, selection cursor
deep = "#0a5898"   # secondary accent — keywords, diff minus
mist = "#006a8a"   # strings — dark teal-blue
pale = "#1a6090"   # types, constants — muted blue
mid  = "#2878a8"   # operators, tags — medium blue
